name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: koda
            gui_name: koda-gui
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: koda.exe
            gui_name: koda-gui.exe
          - os_name: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin_name: koda
            gui_name: koda-gui

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libx11-dev libxkbcommon-dev libxcursor-dev libxrandr-dev libxi-dev libasound2-dev

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Binaries
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin_name }} staging/
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.gui_name }} staging/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: koda-${{ matrix.platform.os_name }}
          path: staging/*

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}